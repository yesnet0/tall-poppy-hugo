{{ define "main" }}
<section class="tp-section">
  <div class="tp-kicker">Portfolio</div>
  <h2 class="tp-section__title">Companies built, founded, and backed.</h2>
  <div class="tp-grid-3">
    {{ range site.Data.companies }}
    <a href="{{ print "portfolio/" .id "/" | relURL }}" class="tp-card">
      <span class="tp-card__badge">{{ .role }}</span>
      <div class="tp-card__kicker">{{ .kicker }}</div>
      <h3 class="tp-card__title">{{ .name }}</h3>
      <p class="tp-card__tagline">{{ .tagline | default .description }}</p>
      <span class="tp-card__more">Learn more →</span>
    </a>
    {{ end }}
  </div>
</section>
{{ end }}
