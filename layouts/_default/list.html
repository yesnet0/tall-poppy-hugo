{{ define "main" }}
<section class="tp-shell" style="max-width:1120px;">
  <h1 class="tp-shell__title">{{ .Title }}</h1>
  {{ with .Content }}<div class="prose">{{ . }}</div>{{ end }}

  {{ if .Pages }}
  <div class="tp-grid-3" style="margin-top:40px;">
    {{ range .Pages }}
    <a href="{{ .Permalink }}" class="tp-card">
      <h3 class="tp-card__title" style="font-size:20px;">{{ .Title }}</h3>
      {{ with .Description }}<p class="tp-card__tagline" style="margin-bottom:0;">{{ . }}</p>{{ end }}
      <span class="tp-card__more">Read more →</span>
    </a>
    {{ end }}
  </div>
  {{ end }}
</section>
{{ end }}
