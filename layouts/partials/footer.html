<footer class="tp-footer">
  <div class="tp-wrap tp-footer__inner">
    <div>
      <div class="tp-footer__brand">
        <img src="{{ "images/tallpoppygroup_square.png" | relURL }}" alt="Tall Poppy Group" class="tp-footer__mark" width="34" height="34">
        <span class="tp-footer__name">Tall Poppy Group</span>
      </div>
      <p class="tp-footer__tagline">Applied cybersecurity.</p>
    </div>

    <div>
      <div class="tp-footer__col-title">Navigation</div>
      <a href="{{ "about/" | relURL }}" class="tp-footer__link">About</a>
      <a href="{{ "portfolio/" | relURL }}" class="tp-footer__link">Portfolio</a>
      <a href="{{ "advisory/" | relURL }}" class="tp-footer__link">Investing &amp; Advisory</a>
      <a href="{{ "contact/" | relURL }}" class="tp-footer__link">Contact</a>
    </div>

    <div>
      <div class="tp-footer__col-title">Connect</div>
      <a href="mailto:{{ .Site.Params.email }}" class="tp-footer__link">{{ .Site.Params.email }}</a>
      <a href="{{ .Site.Params.linkedin }}" target="_blank" rel="noopener noreferrer" class="tp-footer__link">LinkedIn</a>
      <a href="{{ .Site.Params.twitter }}" target="_blank" rel="noopener noreferrer" class="tp-footer__link">Twitter / X</a>
    </div>
  </div>
  <div class="tp-footer__bar">© {{ now.Year }} TALL POPPY GROUP. ALL RIGHTS RESERVED.</div>
</footer>
