{{ $section := .Section }}
<header class="tp-header">
  <div class="tp-wrap tp-header__inner">
    <a href="{{ "/" | relURL }}" class="tp-brand">
      <img src="{{ "images/tallpoppygroup_square.png" | relURL }}" alt="Tall Poppy Group" class="tp-brand__mark" width="34" height="34">
      <span class="tp-brand__name">Tall Poppy Group</span>
    </a>

    <nav class="tp-nav">
      <a href="{{ "about/" | relURL }}" class="tp-nav__link{{ if eq $section "about" }} is-active{{ end }}">About</a>

      <div class="tp-dropdown-wrap">
        <a href="{{ "portfolio/" | relURL }}" class="tp-nav__link{{ if eq $section "portfolio" }} is-active{{ end }}">
          Portfolio <span class="tp-nav__caret">▾</span>
        </a>
        <div class="tp-dropdown">
          <a href="{{ "portfolio/" | relURL }}" class="tp-dropdown__item tp-dropdown__item--strong">Companies</a>
          {{ range site.Data.companies }}
          <a href="{{ print "portfolio/" .id "/" | relURL }}" class="tp-dropdown__item">{{ .name }}</a>
          {{ end }}
        </div>
      </div>

      <a href="{{ "advisory/" | relURL }}" class="tp-nav__link{{ if eq $section "advisory" }} is-active{{ end }}">Investing &amp; Advisory</a>
      <a href="{{ "contact/" | relURL }}" class="tp-btn tp-btn--primary">Get in touch</a>
    </nav>

    <button id="mobile-menu-toggle" class="tp-mobile-toggle" aria-label="Open menu">
      <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
      </svg>
    </button>
  </div>
</header>

<div id="mobile-menu-overlay" class="tp-mobile-overlay"></div>
<div id="mobile-menu" class="tp-mobile-menu">
  <button id="close-mobile-menu" class="tp-mobile-menu__close" aria-label="Close menu">
    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
    </svg>
  </button>
  <nav>
    <a href="{{ "about/" | relURL }}">About</a>
    <a href="{{ "portfolio/" | relURL }}">Portfolio</a>
    <div class="tp-mobile-sub">
      {{ range site.Data.companies }}
      <a href="{{ print "portfolio/" .id "/" | relURL }}">{{ .name }}</a>
      {{ end }}
    </div>
    <a href="{{ "advisory/" | relURL }}">Investing &amp; Advisory</a>
    <a href="{{ "contact/" | relURL }}">Get in touch</a>
  </nav>
</div>
