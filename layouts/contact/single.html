{{ define "main" }}
<section class="tp-shell">
  <div class="tp-kicker">Contact</div>
  <h1 class="tp-shell__title">Let's talk.</h1>

  <div id="form-messages"></div>
  <script>
    (function(){
      const params = new URLSearchParams(window.location.search);
      const box = document.getElementById('form-messages');
      if (params.get('success') === 'true') {
        box.innerHTML = '<div class="tp-alert tp-alert--ok"><strong>Thanks —</strong> message received. We\'ll be in touch.</div>';
      } else if (params.get('error')) {
        box.innerHTML = '<div class="tp-alert tp-alert--error">Something went wrong. Please email <strong>hello@tallpoppygroup.com</strong> directly.</div>';
      }
    })();
  </script>

  <p class="tp-shell__lead tp-form__note">
    Interested in Tall Poppy Group, pitching us your company, or reporting something?
    Use the form, or reach us via the channels below.
  </p>

  <div class="tp-contact-channels">
    <a href="mailto:{{ .Site.Params.email }}">{{ .Site.Params.email }}</a>
    <a href="{{ .Site.Params.linkedin }}" target="_blank" rel="noopener noreferrer">LinkedIn — /company/tallpoppygroup</a>
    <a href="{{ .Site.Params.twitter }}" target="_blank" rel="noopener noreferrer">Twitter / X — @tallpoppygroup</a>
  </div>

  <form action="https://tpg-contact-form.cje.workers.dev" method="POST" class="tp-form tp-contact__form">
    <div class="tp-form__row">
      <label class="tp-field">
        <span class="tp-label">Name</span>
        <input type="text" name="name" required class="tp-input" placeholder="Jane Researcher">
      </label>
      <label class="tp-field">
        <span class="tp-label">Email</span>
        <input type="email" name="email" required class="tp-input" placeholder="you@company.com">
      </label>
    </div>
    <label class="tp-field">
      <span class="tp-label">Company (optional)</span>
      <input type="text" name="company" class="tp-input">
    </label>
    <label class="tp-field">
      <span class="tp-label">What's on your mind?</span>
      <textarea name="message" rows="5" required class="tp-textarea" placeholder="Tell us about your company or your bug…"></textarea>
    </label>
    <button type="submit" class="tp-btn tp-btn--primary tp-btn--lg tp-contact__submit">Send message</button>
  </form>
</section>
{{ end }}
